services:
  mysql:
    image: mysql:8.0
    container_name: wework-mysql
    environment:
      MYSQL_ROOT_PASSWORD: wework123
      MYSQL_DATABASE: wework_logs
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: wework-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3010:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: wework123
      DB_NAME: wework_logs
    volumes:
      - ./keys:/app/keys

  frontend:
    image: node:20-alpine
    container_name: wework-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app

volumes:
  mysql_data: