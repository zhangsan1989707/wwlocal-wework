services:
  mysql:
    image: mysql:8.0
    container_name: wework-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?请在 .env 文件中设置 DB_PASSWORD}
      MYSQL_DATABASE: wework_logs
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wework-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: wework-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3010:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-wework_app}
      DB_PASSWORD: ${DB_PASSWORD:?请在 .env 文件中设置 DB_PASSWORD}
      DB_NAME: wework_logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WEWORK_BASE_URL: ${WEWORK_BASE_URL:-}
      WEWORK_CORPID: ${WEWORK_CORPID:-}
      WEWORK_SECRET: ${WEWORK_SECRET:-}
      WEWORK_CONTACT_SECRET: ${WEWORK_CONTACT_SECRET:-}
      WEWORK_INSECURE_SKIP_VERIFY: ${WEWORK_INSECURE_SKIP_VERIFY:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?请在 .env 文件中设置 AUTH_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 文件中设置 JWT_SECRET}
      KEY_ENCRYPT_KEY: ${KEY_ENCRYPT_KEY:-}
    volumes:
      - ./keys:/app/keys

  frontend:
    build: ./web
    container_name: wework-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  redis_data:
