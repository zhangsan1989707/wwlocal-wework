server:
  host: 0.0.0.0
  port: 8080

database:
  host: localhost
  port: 3306
  user: root
  password: ""  # 通过环境变量 DB_PASSWORD 设置
  dbname: wework_logs

wework:
  base_url: ""
  corpid: ""      # 通过环境变量 WEWORK_CORPID 设置
  secret: ""      # 通过环境变量 WEWORK_SECRET 设置
  contact_secret: ""  # 通过环境变量 WEWORK_CONTACT_SECRET 设置
  sync_limit: 1000
  insecure_skip_verify: false  # 生产环境勿开启，仅内网自签证书场景使用

keys:
  storage_path: ./keys
  default_version: v1

auth:
  username: admin
  password: ""    # 通过环境变量 AUTH_PASSWORD 设置
  jwt_secret: ""  # 通过环境变量 JWT_SECRET 设置

scheduler:
  enabled: false
  interval: "1h"

rate_limit:
  enabled: true
  requests_per_minute: 100
  burst: 20

